<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Thank you</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="card" style="max-width: 520px; margin: 40px auto; text-align: center">
        <h1>THANK YOU</h1>
        <p id="amt"></p>
        <p>Your order was recorded.</p>
        <p><a href="/user-portal.html"><button type="button">Continue shopping</button></a></p>
      </div>
    </div>
    <script>
      var p = new URLSearchParams(location.search);
      document.getElementById("amt").textContent =
        "Total amount: Rs " + (p.get("total") || "?") + " — Order #" + (p.get("orderId") || "");
    </script>
  </body>
</html>
